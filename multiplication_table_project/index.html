<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiplication Table</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js" defer></script>
</head>
<body>
<h1>Insert your number to know the Mutiplication Table</h1>

<form id="multiplication-form">
    <div class="form-control">
        <label for="number">Table For:</label>
        <input type="number" name="number" id="number" placeholder="4">
    </div>

    <div class="form-control">
        <label for="multiplicator">Table Until:</label>
        <input type="number" name="multiplicator" id="multiplicator" value="10">
    </div>

    <input type="submit" value="Compute">
</form>

<div id="multiplication-table">
    <h2 id="multiplication-title">Multiplicatiom table for number: <span></span></h2>
    <div id="multiplication-operations">
        <p>Inform a number to compute the multiplication table...</p>
    </div>
</div>
</body>
</html>
