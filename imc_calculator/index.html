<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>IMC Calculator</title>
    <!-- Lato Font-Family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/scripts.js" defer></script>
</head>
<body>
<div class="container">
    <div id="calc-container">
        <h2>IMC Calculator</h2>
        <form action="" id="imc-form">
            <div class="form-inputs">
                <div class="form-control">
                    <label for="height">Height: </label>
                    <input type="text" name="height" id="height" placeholder="Example 1,80">
                </div>
                <div class="form-control">
                    <label for="weight">Weight: </label>
                    <input type="text" name="weight" id="weight" placeholder="Example 74,7">
                </div>
            </div>
            <div class="action-control">
                <button id="calc-btn">Calculate</button>
                <button id="clean-btn">Limpar</button>
            </div>
        </form>
    </div>
    <div id="result-container" class="hide">
        <p id="imc-number">Your IMC: <span class="good"></span></p>
        <p id="imc-info">Actual Situation: <span class="good"></span></p>
        <h3>Look your classification</h3>
        <div id="imc-table">
            <div class="table-header">
                <h4>IMC</h4>
                <h4>Classification</h4>
                <h4>Obesity</h4>
            </div>
        </div>
        <button id="back-btn">Return</button>
    </div>
</div>

</body>
</html>
